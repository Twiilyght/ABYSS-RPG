<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss RPG - Ficha Digital </title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=400;700&family=Oswald:wght=500&family=Quicksand:wght=400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050507;
            --panel-bg: rgba(21, 21, 26, 0.95);
            --primary-purple: #7b1fa2;
            --light-purple: #bc4ed8;
            --text-gold: #d4af37;
            --text-light: #f0f0f0;
            --border-color: #4a3427;
        }

        * { box-sizing: border-box; }
        /* Texto normal agora usa Cinzel */
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Cinzel', serif; margin: 0; display: flex; overflow-x: hidden; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .sidebar { 
            position: fixed; left: 0; top: 0; height: 100%; width: 70px; 
            background: #000; border-right: 1px solid var(--border-color); 
            display: flex; flex-direction: column; align-items: center; 
            padding-top: 40px; z-index: 1000; 
        }
        .sidebar-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid transparent; 
            color: var(--text-gold); font-size: 1.6rem; cursor: pointer; 
            margin-bottom: 20px; width: 50px; height: 50px; border-radius: 12px; 
            transition: 0.4s; display: flex; align-items: center; justify-content: center; 
            font-family: 'Cinzel', serif; outline: none;
        }
        .sidebar-btn.active { border-color: var(--light-purple); box-shadow: 0 0 15px var(--primary-purple); background: rgba(123, 31, 162, 0.2); }
        select.sidebar-btn { appearance: none; padding-left: 10px; font-size: 1.2rem; }

        .container { max-width: 1400px; margin: 0 auto 0 100px; flex-grow: 1; padding: 40px 20px; }
        .title { font-family: 'Cinzel', serif; text-align: center; color: var(--primary-purple); text-shadow: 0 0 20px rgba(123, 31, 162, 0.5); letter-spacing: 8px; font-size: 3rem; margin-bottom: 40px; }

        .page-area { display: none; }
        .page-area.active { display: block; }

        .section-box { background: var(--panel-bg); border: 1px solid var(--border-color); margin-bottom: 30px; padding: 35px 20px 20px; border-radius: 8px; position: relative; }
        /* Títulos quadradinhos com Oswald */
        .section-title { font-family: 'Oswald', sans-serif; position: absolute; top: -12px; left: 25px; background: var(--bg-dark); padding: 0 15px; color: var(--text-gold); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }

        .attributes-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; }
        .attr-container-outer { position: relative; width: 110px; height: 125px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .attr-container-outer:hover { transform: translateY(-10px); filter: drop-shadow(0 0 15px var(--primary-purple)); }
        .attr-hexagon-border { position: absolute; width: 100%; height: 100%; background: var(--primary-purple); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; justify-content: center; align-items: center; }
        .attr-hexagon-inner { width: 94%; height: 94%; background: #0c0c10; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .attr-value-input { background: transparent; border: none; color: #fff; font-family: 'Cinzel'; font-size: 2rem; width: 60px; text-align: center; outline: none; }
        
        .difficulty-selector { display: flex; justify-content: center; gap: 10px; margin: 20px auto; width: 100%; max-width: 400px; }
        .diff-btn { background: #111; border: 1px solid #333; color: #666; padding: 10px 25px; cursor: pointer; font-family: 'Cinzel'; border-radius: 4px; transition: 0.3s; }
        .diff-btn.active { border-color: var(--text-gold); color: var(--text-gold); background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        .skills-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 6px; }
        .skill-item { 
            background: rgba(0,0,0,0.3); border: 1px solid #2a2a2a; padding: 6px 10px; 
            display: flex; align-items: center; justify-content: space-between; 
            border-left: 3px solid var(--primary-purple); border-radius: 4px; 
            cursor: pointer; transition: 0.2s; font-family: 'Cinzel', serif;
        }
        .skill-item:hover { background: rgba(123, 31, 162, 0.1); border-color: var(--light-purple); }
        .skill-name { font-size: 0.85rem; font-weight: bold; color: #ddd; font-family: 'Cinzel', serif; }
        
        .abilities-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .spell-section { grid-column: 1 / -1; }

        .hab-card { background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 20px; border-left: 5px solid var(--primary-purple); border-radius: 4px; margin-bottom: 15px; position: relative; }
        .hab-desc-render { color: #aaa; font-size: 0.9rem; margin: 10px 0; white-space: pre-wrap; font-family: 'Cinzel', serif; }
        
        .btn-roll { padding: 8px 15px; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; border: 1px solid; background: transparent; margin-right: 8px; margin-top: 8px; font-size: 0.85rem; transition: 0.2s; }
        .btn-forge { background: var(--primary-purple); color: #fff; border: none; padding: 12px; width: 100%; font-family: 'Cinzel'; cursor: pointer; border-radius: 4px; margin-bottom: 20px; transition: 0.2s; }
        .btn-action-card { background: none; border: none; color: #888; cursor: pointer; font-size: 0.9rem; margin-left: 8px; transition: 0.2s; }
        .btn-action-card:hover { color: #fff; }

        #central-popup {
            position: fixed; bottom: 20px; right: 20px; width: 320px; 
            background: #0c0c12; border: 2px solid var(--text-gold); 
            padding: 15px; z-index: 9999; text-align: center; font-family: 'Cinzel', serif;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            opacity: 0; pointer-events: none;
            transform: translateX(120%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        #central-popup.active { opacity: 1; transform: translateX(0); pointer-events: all; }
        .ornament { position: absolute; width: 30px; height: 30px; border: 1px solid var(--text-gold); }
        .tl { top: -5px; left: -5px; border-right: none; border-bottom: none; }
        .tr { top: -5px; right: -5px; border-left: none; border-bottom: none; }
        .bl { bottom: -5px; left: -5px; border-right: none; border-top: none; }
        .br { bottom: -5px; right: -5px; border-left: none; border-top: none; }
        .pop-close-btn { position: absolute; right: 8px; top: 5px; color: var(--text-gold); cursor: pointer; font-size: 0.8rem; }

        .editor-toolbar { display: flex; gap: 5px; margin-bottom: 10px; background: #111; padding: 5px; border-radius: 4px; }
        .toolbar-btn { background: #222; border: 1px solid #444; color: #fff; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 0.8rem; }
        .toolbar-btn:hover { background: var(--primary-purple); }
        .modal-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #333; }
        .tab-btn { background: none; border: none; color: #666; padding: 10px; cursor: pointer; font-family: 'Cinzel'; }
        .tab-btn.active { color: var(--text-gold); border-bottom: 2px solid var(--text-gold); }

        .pop-total-text { font-size: 2.8rem; color: var(--text-gold); margin: 0; }
        .pop-status-text { font-size: 1.3rem; margin: 5px 0; font-weight: bold; }
        .pop-detail-text { font-family: 'Cinzel'; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 650px; max-height: 90vh; overflow-y: auto; background: #0a0a0c; border: 2px solid var(--text-gold); padding: 30px; z-index: 10000; border-radius: 8px; }
        .modal-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin-bottom: 15px; border-radius: 4px; font-family: 'Cinzel'; }
   
        .header-status-container {
            display: flex; flex-direction: column; gap: 10px; margin: 0 auto 30px auto;
            max-width: 600px; background: rgba(0, 0, 0, 0.4); padding: 15px;
            border-radius: 8px; border: 1px solid var(--border-color);
        }

        .status-row { display: flex; align-items: center; gap: 12px; }
        .status-label { font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--text-gold); width: 30px; font-weight: bold; display: flex; align-items: center; gap: 2px; }
        .status-bar-bg { flex-grow: 1; height: 6px; background: #000; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-fill { height: 100%; width: 100%; transition: width 0.3s ease-out, background-color 0.3s; }

        .bg-red { background: #ff1744; box-shadow: 0 0 8px #ff1744; }
        .bg-pink { background: #ff4081; box-shadow: 0 0 8px #ff4081; }
        .bg-gold { background: #ffca28; box-shadow: 0 0 8px #ffca28; }
        .bg-cyan { background: #00e5ff; box-shadow: 0 0 8px #00e5ff; }
        .bg-blue { background: #2979ff; box-shadow: 0 0 8px #2979ff; } 

        .status-controls { display: flex; align-items: center; gap: 4px; }
        .status-controls input { background: rgba(0,0,0,0.3); border: 1px solid #333; color: #fff; font-family: 'Cinzel'; font-size: 0.85rem; width: 40px; text-align: center; border-radius: 4px; }

        .arrow-btn { background: none; border: none; color: var(--primary-purple); cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .arrow-btn:hover { color: var(--light-purple); transform: scale(1.2); }
        .sep { color: #555; font-size: 0.8rem; }
        
        .calc-input { width: 50px !important; border: 1px solid var(--text-gold) !important; background: rgba(212,175,55,0.05) !important; font-weight: bold; }
        
        .condition-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 3px; font-weight: bold; margin-left: 5px; display: inline-block; vertical-align: middle; font-family: 'Cinzel', sans-serif;}
        .cond-normal { display: none; }
        .cond-temp { background: #ff4081; color: #000; }
        .cond-machucado { background: #ff9100; color: #000; }
        .cond-morrendo { background: #000; color: #ff1744; border: 1px solid #ff1744; animation: pulse 1.5s infinite; }
        .cond-perturbado { background: #7c4dff; color: #fff; }
        .cond-enlouquecendo { background: #00e5ff; color: #000; border: 1px solid #fff; animation: pulse 1s infinite; }
        .cond-sobrepeso { background: #ff5252; color: #fff; font-family: 'Cinzel'; letter-spacing: 1px; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .mini-stats-overlay { display: flex; justify-content: space-around; padding-top: 10px; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .mini-stat-item { display: flex; align-items: center; gap: 8px; }
        .mini-stat-label { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--text-gold); }
        .mini-stat-input { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; font-family: 'Cinzel'; font-size: 1rem; width: 45px; text-align: center; border-radius: 4px; outline: none; }

        .defense-layout-container { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media(max-width: 1000px) { .defense-layout-container { grid-template-columns: 1fr; } }

        .defense-panel { background: rgba(15, 15, 20, 0.7); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; height: fit-content; }
        .defense-header { font-family: 'Oswald', sans-serif; text-transform: uppercase; color: var(--text-gold); font-size: 0.85rem; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .rd-item-row { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 4px; margin-bottom: 6px; border: 1px solid #222; }
        .rd-item-row.active-mitigation { border-color: var(--light-purple); background: rgba(123,31,162,0.1); }
        .rd-name-input { background: transparent; border: none; color: #eee; font-size: 0.8rem; flex-grow: 1; outline: none; font-family: 'Cinzel'; }
        .rd-name-input:focus { border-bottom: 1px solid var(--light-purple); }

        .inv-header-dashboard { display: flex; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #222; align-items: center; }
        .inv-weight-box { font-family: 'Cinzel'; font-size: 1rem; color: var(--text-gold); }
        .item-grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .item-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); border-radius: 6px; padding: 12px; position: relative; border-left: 4px solid #888; }
        .item-card.equipped { border-left-color: var(--text-gold); background: rgba(212,175,55,0.03); }
        .item-footer-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
        .item-weight-indicator { font-size: 0.75rem; color: #aaa; display: flex; align-items: center; gap: 4px; }
        .item-weight-indicator input { width: 40px; background: #000; border: 1px solid #333; color: var(--text-gold); text-align: center; border-radius: 3px; font-size: 0.75rem; font-family: 'Cinzel'; }

        .btn-info-skill { background: transparent; border: none; color: var(--light-purple); cursor: pointer; font-size: 0.8rem; margin-left: 20px; }
        .btn-info-skill:hover { color: #fff; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="sidebar-btn active" id="btn-ficha" onclick="mudarArea('ficha')">📜</button>
    <button class="sidebar-btn" id="btn-combate" onclick="mudarArea('combate')">⚔️</button>
    <button class="sidebar-btn" id="btn-inventario" onclick="mudarArea('inventario')">🎒</button>
    <button class="sidebar-btn" onclick="salvarNoNavegador()" title="Salvar">💾</button>
    <select id="save-slot" class="sidebar-btn" onchange="carregarDoNavegador()" title="Mudar Slot">
        <option value="1">🗂️ 1</option>
        <option value="2">🗂️ 2</option>
        <option value="3">🗂️ 3</option>
        <option value="4">🗂️ 4</option>
        <option value="5">🗂️ 5</option>
        <option value="6">🗂️ 6</option>
        <option value="7">🗂️ 7</option>
        <option value="8">🗂️ 8</option>
        <option value="9">🗂️ 9</option>
        <option value="10">🗂️ 10</option>
    </select>
</div>

<div class="container">
    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px; margin-bottom: 10px;">
        <input type="text" id="user-nickname" placeholder="Nickname" style="background: transparent; border: none; border-bottom: 1px solid var(--border-color); color: var(--text-gold); text-align: right; outline: none; font-family: 'Cinzel';">
        <input type="text" id="user-sub" placeholder="Antecedência" style="background: transparent; border: none; border-bottom: 1px solid var(--border-color); color: #aaa; text-align: right; outline: none; font-family: 'Cinzel'; font-size: 0.85rem;">
    </div>
    <h1 class="title" style="margin-bottom: 10px; font-family: 'Oswald', sans-serif; text-transform: uppercase;">Abyss RPG</h1>

    <div class="header-status-container">
        <div class="status-row">
            <span class="status-label">PV <span id="badge-pv" class="condition-badge cond-normal"></span></span>
            <div class="status-bar-bg"><div id="bar-pv" class="status-fill bg-red"></div></div>
            <div class="status-controls">
                <button class="arrow-btn" onclick="changeStat('pv', -1)">◀</button>
                <input type="number" id="curr-pv" value="20" onchange="updateBar('pv')">
                <span class="sep">/</span>
                <input type="number" id="max-pv" value="20" onchange="updateBar('pv')">
                <button class="arrow-btn" onclick="changeStat('pv', 1)">▶</button>
                <input type="number" id="calc-pv" class="calc-input" placeholder="+/-" onchange="aplicarModificador('pv')">
            </div>
        </div>

        <div class="status-row">
            <span class="status-label">PA</span>
            <div class="status-bar-bg"><div id="bar-pa" class="status-fill bg-gold"></div></div>
            <div class="status-controls">
                <button class="arrow-btn" onclick="changeStat('pa', -1)">◀</button>
                <input type="number" id="curr-pa" value="10" onchange="updateBar('pa')">
                <span class="sep">/</span>
                <input type="number" id="max-pa" value="10" onchange="updateBar('pa')">
                <button class="arrow-btn" onclick="changeStat('pa', 1)">▶</button>
                <input type="number" id="calc-pa" class="calc-input" placeholder="+/-" onchange="aplicarModificador('pa')">
            </div>
        </div>

        <div class="status-row">
            <span class="status-label">PS <span id="badge-ps" class="condition-badge cond-normal"></span></span>
            <div class="status-bar-bg"><div id="bar-ps" class="status-fill bg-cyan"></div></div>
            <div class="status-controls">
                <button class="arrow-btn" onclick="changeStat('ps', -1)">◀</button>
                <input type="number" id="curr-ps" value="15" onchange="updateBar('ps')">
                <span class="sep">/</span>
                <input type="number" id="max-ps" value="15" onchange="updateBar('ps')">
                <button class="arrow-btn" onclick="changeStat('ps', 1)">▶</button>
                <input type="number" id="calc-ps" class="calc-input" placeholder="+/-" onchange="aplicarModificador('ps')">
            </div>
        </div>
        
        <div class="mini-stats-overlay">
            <div class="mini-stat-item">
                <span class="mini-stat-label">DEFESA</span>
                <input type="number" id="val-defesa" class="mini-stat-input" value="10">
            </div>
            <div class="mini-stat-item">
                <span class="mini-stat-label">NÍVEL</span>
                <select id="val-nivel" class="mini-stat-input" style="appearance: none; cursor: pointer; padding-left: 15px;">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="mini-stat-item">
                <span class="mini-stat-label">DESLOC</span>
                <input type="number" id="val-desloc" class="mini-stat-input" value="9">
            </div>
        </div>
    </div>

    <div id="area-ficha" class="page-area active">
        <div class="defense-layout-container">
            <div>
                <section class="section-box">
                    <div class="section-title">Atributos</div>
                    <div id="attr-container" class="attributes-grid"></div>
                </section>

                <div class="difficulty-selector">
                    <button class="diff-btn" id="df-facil" onclick="setDif('facil')">FÁCIL</button>
                    <button class="diff-btn active" id="df-normal" onclick="setDif('normal')">NORMAL</button>
                    <button class="diff-btn" id="df-dificil" onclick="setDif('dificil')">DIFÍCIL</button>
                </div>
            </div>

            <div class="defense-panel">
                <div class="defense-header" style="font-family: 'Cinzel', serif; text-transform: none;">Bloqueio</div>
                <div class="rd-item-row" style="border-left: 3px solid var(--text-gold);">
                    <input type="checkbox" id="chk-bloqueio">
                    <span style="font-size: 0.8rem; font-weight: bold; color: var(--text-gold); flex-grow: 1;">Bloqueio Base</span>
                    <input type="number" id="val-bloqueio" value="0" class="mini-stat-input" style="width: 40px; height: 25px; font-size: 0.85rem;">
                </div>

                <div class="defense-header" style="margin-top: 20px;">
                    <span>🔮 Resistências (RD)</span>
                    <button onclick="adicionarNovaRD()" style="background: none; border: 1px solid var(--light-purple); color: var(--light-purple); font-size: 0.7rem; padding: 2px 5px; cursor: pointer; border-radius: 3px; font-family: 'Cinzel';">+ Add RD</button>
                </div>
                <div id="rd-dinamicas-lista"></div>
            </div>
        </div>

        <section class="section-box">
            <div class="section-title">Perícias</div>
            <div id="skills-container" class="skills-list"></div>
        </section>

        <section class="section-box">
            <div class="section-title">Atributos Especiais</div>
            <div class="skills-list">
                <div class="skill-item" onclick="rolarSorte()" style="border-left-color: #ffca28;">
                    <div><span class="skill-name" style="color: #ffca28;">Sorte</span></div>
                    <span style="color: #aaa; font-size: 0.8rem;">(Sorte - Azar)</span>
                </div>
                <div class="skill-item" onclick="rolarSentidos()" style="border-left-color: #00e5ff;">
                    <div><span class="skill-name" style="color: #00e5ff;">Sentidos</span></div>
                    <span style="color: #aaa; font-size: 0.8rem;">Percepção + POD</span>
                </div>
                <div class="skill-item" style="cursor: default; border-left-color: #ff1744;">
                    <div><span class="skill-name" style="color: #ff1744;">Velocidade</span></div>
                    <span id="display-velocidade" style="color: #ddd; font-weight: bold; font-size: 0.9rem;"></span>
                </div>
            </div>
        </section>
    </div>

    <div id="area-combate" class="page-area">
        <div class="abilities-columns">
            <section class="section-box">
                <div class="section-title">Ataques</div>
                <button class="btn-forge" onclick="abrirEditorHab('ataque')">+ Forjar Novo Ataque</button>
                <div id="ataques-lista"></div>
            </section>
            <section class="section-box">
                <div class="section-title">Habilidades</div>
                <button class="btn-forge" onclick="abrirEditorHab('habilidade')">+ Forjar Nova Habilidade</button>
                <div id="habilidades-lista"></div>
            </section>
        </div>
        <section class="section-box spell-section">
            <div class="section-title">Feitiços</div>
            <button class="btn-forge" onclick="abrirEditorHab('feitico')">+ Forjar Novo Feitiço</button>
            <div id="feiticos-lista" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        </section>
    </div>

    <div id="area-inventario" class="page-area">

<script>
    let sheet = {
        atributos: {"FOR":1, "AGI":1, "INT":1, "CON":1, "POD":1},
        pericias: [],
        habilidades: [],
        itens: [], 
        rds: [],   
        dificuldade: 'normal',
        recursosFinos: { pv_temp: 0, ps_temp: 0 },
        limiteCarga: 20,
        nivel: 0
    };

    const dtTabela = {
        facil: { falha: 9, sucesso: 10, bom: 20, extremo: 21 },
        normal: { falha: 12, sucesso: 13, bom: 20, extremo: 21 },
        dificil: { falha: 15, sucesso: 16, bom: 20, extremo: 21 }
    };

    const periciasDados = [
        { n: "Acrobacia", a: "AGI" }, { n: "Adestramento", a: "POD" }, { n: "Artes", a: "POD" },
        { n: "Alquimia", a: "INT" }, { n: "Arcanismo", a: "POD" }, { n: "Atletismo", a: "FOR" },
        { n: "Atualidades", a: "INT" }, { n: "Ciências", a: "INT" }, { n: "Crime", a: "AGI" },
        { n: "Diplomacia", a: "POD" }, { n: "Enganação", a: "POD" }, { n: "Fortitude", a: "CON" },
        { n: "Furtividade", a: "AGI" }, { n: "Iniciativa", a: "AGI" }, { n: "Intimidação", a: "POD" },
        { n: "Intuição", a: "POD" }, { n: "Investigação", a: "INT" }, { n: "Linguística", a: "INT" },
        { n: "Luta", a: "FOR" }, { n: "Medicina", a: "INT" }, { n: "Monstrologia", a: "INT" },
        { n: "Percepção", a: "POD" }, { n: "Pilotagem", a: "AGI" }, { n: "Pontaria", a: "AGI" },
        { n: "Profissão", a: "VAR" }, { n: "Reflexos", a: "AGI" }, { n: "Religião", a: "POD" },
        { n: "Sobrevivência", a: "INT" }, { n: "Tática", a: "INT" }, { n: "Tecnologia", a: "INT" },
        { n: "Vontade", a: "POD" }
    ];

    const descPericias = {
        "Acrobacia": "<i>Você é capaz de realizar movimentos ágeis e acrobacias difíceis, se equilibrar ou escapar habilmente.</i><br><br><b>Usos Específicos</b><br><b>[Amortecer Queda]:</b> Você se move para cair da forma correta e reduzir o dano. Você reduz o dano pela metade. (Sucesso Normal)<br><b>[Levantar Rapidamente]:</b> Gaste sua ação de Interferência para levantar-se imediatamente após a queda. Se falhar, você permanece Caído. (Sucesso Bom)",
        "Adestramento": "<i>Você tem conhecimento sobre como lidar e educar animais, cuidar deles ou manipulá-los.</i><br><br><b>Usos específicos</b><br><b>[Manejar Animal]:</b> Gaste uma ação de movimento para fazer um animal realizar uma ação a qual foi treinado para fazer (In Lore ou durante Cenas de Descanso). (Sucesso Normal)<br><b>[Entender Animal]:</b> Você consegue supor o que um Animal quer dizer de acordo com sua linguagem corporal. Entender um Animal não possui uma DT específica, mas o seu resultado define o seu entendimento sobre isso. Por exemplo, uma Falha Normal pode ser um entendimento APROXIMADO do verdadeiro. Ação livre.",
        "Artes": "<i>Você sabe se expressar com diversas formas de arte, como música, dança, escrita, pintura, atuação e outras.</i><br><br><b>Usos Específicos</b><br><b>[Impressionar]:</b> Faça um teste de Artes oposto pelo teste de Vontade de quem você está tentando impressionar. Se você passar, recebe +2 em testes de perícia baseadas em Presença contra essa pessoa no mesmo dia. Se falhar, sofre –2 nesses testes. Se estiver tentando impressionar mais de uma pessoa, o mestre faz apenas um teste pela plateia toda, usando o melhor bônus. Este uso leva de alguns minutos (música ou dança) até algumas horas (apresentação de teatro). Um uso por dia.<br><b>[Atuar]:</b> Você pode usar Artes no lugar de Enganação para mentir.",
        "Atletismo": "<i>Você é capaz de realizar feitos atléticos e sair na frente dos demais.</i><br><br><b>Usos Específicos</b><br><b>[Correr]:</b> Você utiliza uma ação completa para correr e soma o seu nível de Sucesso na corrida. Sucesso Normal adiciona +2 Quadrados, Sucesso Bom adiciona +4 Quadrados e Sucesso Extremo adiciona +6 Quadrados.<br><b>[Escalar]:</b> Você escala por 5m e soma seu nível de Sucesso no resultado. Sucesso Normal adiciona +3m, Sucesso Bom adiciona +4m e Sucesso Extremo adiciona +7m. Escalar custa uma ação de movimento e pode ser reutilizada com uma ação padrão. Uma Falha Normal te faz escorregar por 5m e uma Falha Crítica faz você cair direto no chão. Ação completa.<br><b>[Nadar e Mergulhar]:</b> Você avança por 6q e soma seu nível de Sucesso no resultado. Sucesso Normal adiciona +4q, Sucesso Bom adiciona +6q e Sucesso Extremo adiciona +8q. Nadar custa uma ação de movimento e pode ser reutilizada com uma ação padrão. Uma Falha Normal te faz afundar, e você precisa gastar uma ação padrão pra retornar a superfície e uma Falha Crítica faz você afundar ainda mais, precisando gastar a ação de Movimento e Ação Padrão pra voltar.<br><b>[Saltar]:</b> Você salta por uma distância igual ao seu deslocamento +3. gasta ação de movimento.<br><b>[Arremessar]:</b> Você arremessa algo numa distância equivalente ao seu deslocamento e gasta ação de movimento.<br><b>[Levantar]:</b> Você levanta um objeto, seu sucesso é definido pela Zona de acerto atingido.",
        "Ciências": "<i>Você possui uma ou várias áreas de conhecimentos técnicos e especializados, adquiridas por meio de estudo formal, pesquisa e método científico. É capaz de compreender leis naturais, realizar análises precisas, formular hipóteses e explicar fenômenos com base em lógica e evidências. Ciências representa o saber acadêmico, sistemático e aprofundado.</i>",
        "Crime": "<i>Você sabe como trapacear e cometer crimes de forma habilidosa.</i><br><br><b>Usos Específicos</b><br><b>[Arrombar]:</b> Abrir fechaduras, portas, cofres ou dispositivos trancados sem a chave adequada, usando ferramentas ou improviso. A DT varia de acordo com a qualidade da fechadura.<br><b>[Furtar]:</b> Roubar objetos de alvos ou ambientes sem ser percebido, seja em movimento ou distraindo a vítima. A DT é igual ao valor de Percepção do alvo.<br><b>[Plantar]:</b> Colocar objetos em posse de outra pessoa ou em um local específico sem levantar suspeitas. A DT é igual ao valor de Percepção do alvo ou das pessoas na mesma sala.<br><b>[Trapacear]:</b> Enganar em jogos, negociações ou situações sociais, manipulando regras ou percepções a seu favor. A DT varia de acordo com a cena.",
        "Diplomacia": "<i>Você possui alta capacidade de oratória e diálogo, sabe como convencer e persuadir. Testes de Diplomacia com o intuito de manipular ou convencer geralmente são um teste oposto à Vontade do alvo quando o alvo está relutante.</i><br><br><b>Usos Específicos</b><br><b>[Persuadir]:</b> Convencer alguém por meio de argumentos lógicos, carisma e boa comunicação. (DT Vontade)<br><b>[Negociar]:</b> Mediar acordos, barganhar termos e buscar soluções equilibradas entre diferentes interesses. (DT Vontade)<br><b>[Acalmar]:</b> Reduzir tensões, conter discussões ou evitar que situações saiam do controle (DT Vontade). Você pode usar Acalmar para tirar alguém do estado de Enlouquecendo, a DT é um Sucesso Bom.<br><b>[Etiquetas]:</b> Agir de acordo com normas sociais, culturais ou formais, evitando gafes e ganhando respeito. Passar num teste de Etiquetas (no ambiente certo) garante +2 em testes sociais até o fim da cena.<br><b>[Inspirar Confiança]:</b> Transmitir sentimentos e credibilidade, fazendo com que confiem em você e em suas intenções. Dependendo do seu resultado, NPCs e alguns seres podem mudar de atitude com relação a você.",
        "Enganação": "<i>Blefar, mentir e distorcer ao seu bel prazer é quase um dom.</i><br><br><b>Usos Específicos</b><br><b>[Fintar]:</b> Enganar alguém em uma situação imediata, usando movimentos, palavras ou atitudes rápidas para criar uma abertura, distrair o alvo ou fazê-lo reagir de forma errada. Um inimigo Fintado fica Desprevenido contra você no seu próximo ataque. (DT Percepção)<br><b>[Lábia]:</b> Você mente, manipula ou blefa para induzir ações ou enganar NPCs ou Jogadores. (DT Intuição). Você não precisa anunciar que é uma rolagem de Lábia quando contra outros jogadores.<br><b>[Disfarçar Intenções]:</b> Esconder seus verdadeiros objetivos ou sentimentos durante interações. (DT Intuição). Você não precisa anunciar que está disfarçando intenções contra outros jogadores. Passar em um teste de Disfarçar Intenções confere +2 em testes sociais contra um ou mais alvos envolvidos na enganação.",
        "Fortitude": "<i>Você possui resistência física e força de vontade para suportar dor, exaustão e condições adversas. Essa perícia representa sua capacidade de continuar agindo mesmo quando o corpo pede para parar.</i>",
        "Furtividade": "<i>Você é capaz de se mover sem ser percebido, silenciosamente e evitando atenção.</i><br>-# Sua velocidade/deslocamento é cortado pela metade<br><br><b>Usos Específicos</b><br><b>[Esconder]:</b> Você se esconde utilizando o cenário ao seu favor por um momento. Ao se esconder, faça um teste de Furtividade. Esconderijos Parciais (atrás de uma pedra, árvore, etc...) concedem +1 no teste, enquanto Esconderijos Completos (dentro de um armário, em um cômodo fechado, embaixo da cama) concedem +3. Enquanto permanecer escondido, você não pode ser diretamente alvo sem antes ser detectado. Sair do esconderijo ou realizar ações chamativas encerra o efeito.<br><b>[Camuflar]:</b> Você se mistura no ambiente. Jogue seu dado de Furtividade, ele limita a DT de Percepção para te ver. Ações chamativas desfazem sua Camuflagem.<br><b>[Espreitar]:</b> Você persegue um alvo à distância, movendo-se furtivamente (seu deslocamento permanece reduzido pela metade). Caso ataque um alvo que não percebe sua presença, você reduz -2 na Defesa dele contra esse ataque. (Reflexos evita)",
        "Iniciativa": "<i>Esta perícia determina sua velocidade de reação. Quando uma cena de ação começa, cada personagem envolvido faz um teste de Iniciativa. Eles então agem em ordem decrescente dos resultados.</i>",
        "Intimidação": "<i>Seu porte, armas ou palavras são capazes de amedrontar pessoas para conseguir informações ou alcançar algum objetivo. Testes de Intimidação são testes opostos ao teste de Vontade do alvo.</i>",
        "Intuição": "<i>Ao observar ou interagir com alguém, você pode tentar entender suas verdadeiras intenções. Você identifica mentiras, emoções dominantes e possíveis objetivos ocultos. Bons resultados podem revelar detalhes mais profundos ou antecipar cenas.</i>",
        "Investigação": "<i>Você é capaz de analisar pistas, conectar informações e tirar conclusões lógicas a partir de evidências... Também é o seu raciocínio dedutivo, atenção a detalhes relevantes e capacidade de reconstruir eventos.</i><br><br><b>Usos Específicos</b><br><b>[Reconstruir Pista]:</b> Você usa Investigação para tentar reconstruir pistas incompletas ou degradadas.<br><b>[Interrogar]:</b> Você usa Investigação no lugar de outras perícias comunicativas para Interrogar.",
        "Luta": "<i>Você usa Luta para fazer ataques corpo a corpo. A DT é a Defesa do alvo. Se você acertar, causa dano de acordo com a arma utilizada.</i>",
        "Medicina": "<i>Você possui conhecimento sobre o corpo, ferimentos e tratamentos, sendo capaz de diagnosticar, estabilizar e cuidar de condições físicas.</i><br><br><b>Usos Específicos</b><br><b>[Primeiros Socorros]:</b> Você presta atendimento emergencial a um alvo em estado de morrendo. Com sucesso, o alvo deixa esse estado e se torna estável, este uso exige uma Ação Padrão.<br><b>[Necropsia]:</b> Você analisa um corpo para determinar a causa da morte e extrair informações relevantes. Com sucesso, você identifica como a vítima morreu; resultados melhores podem revelar o tipo de arma, tempo de morte, condições anteriores e possíveis circunstâncias do ocorrido. Este processo exige tempo e, idealmente, ferramentas adequadas.",
        "Percepção": "<i>Você nota coisas usando os sentidos.</i><br><br><b>Usos Específicos</b><br><b>[Observar]:</b> Você utiliza sua visão para perceber detalhes no ambiente, como movimentos, figuras escondidas, objetos discretos ou mudanças sutis na cena. Pode ser usado para localizar alvos ocultos, identificar ameaças visuais ou notar algo fora do lugar<br><b>[Escutar]:</b> Você utiliza sua audição para captar sons específicos, como passos, vozes, respiração ou mecanismos em funcionamento, mesmo à distância ou através de obstáculos. Pode ser usado para localizar presenças fora do campo de visão ou antecipar movimentações.",
        "Pilotagem": "<i>Você é capaz de conduzir veículos com controle e precisão, mantendo estabilidade mesmo em situações adversas. Pilotagem envolve reflexos rápidos, coordenação e domínio do veículo em movimento.</i>",
        "Pontaria": "<i>Você usa Pontaria para fazer ataques à distância. A DT é a Defesa do alvo. Se você acertar, causa dano de acordo com a arma utilizada.</i>",
        "Profissão": "<i>Você possui formação e experiência em uma área de trabalho específica, adquiridas por prática contínua, estudo ou vivência. Sua profissão representa não apenas o que você sabe fazer, mas também como você resolve problemas no dia a dia, utilizando técnicas, ferramentas e conhecimentos próprios da sua área. Em situações relacionadas à sua especialidade, você é capaz de agir com eficiência, improvisar soluções e reconhecer detalhes que passariam despercebidos para outros.</i><br><br>Você começa com um objeto de Peso 0 que tem funcionamento padrão e te concede +1 em testes de profissão.  (Você não pode usar Profissão como Luta e Pontaria)",
        "Reflexos": "<i>Você usa esta perícia para testes de resistência contra efeitos que exigem reação rápida, como armadilhas e explosões. A DT é determina pelo efeito. Você também usa Reflexos para evitar fintas.</i>",
        "Religião": "<i>Você possui conhecimento sobre crenças, tradições e instituições religiosas, sendo capaz de interpretar doutrinas, conduzir rituais e exercer autoridade espiritual sobre outras pessoas.</i>",
        "Sobrevivência": "<i>Você sabe como se manter vivo em ambientes hostis, utilizando recursos naturais, instinto e experiência para lidar com fome, clima e perigos do ambiente.</i>",
        "Tática": "<i>Você é capaz de ler o combate, antecipar ações e coordenar movimentos para obter vantagem. Tática representa tomada de decisão rápida, posicionamento e uso inteligente do campo de batalha.</i><br><br><b>Usos Específicos</b><br><b>[Analisar]:</b> Você avalia rapidamente o combate, identificando ameaças, alvos prioritários e oportunidades imediatas. Você ganha bônus dependendo do cenário, geralmente envolvendo um modificador de +2 em um teste relacionado ao o que observou.",
        "Tecnologia": "<i>Você possui conhecimento sobre dispositivos eletrônicos, sistemas digitais e equipamentos tecnológicos, sendo capaz de operar, analisar e manipular tecnologia de forma eficiente.</i><br><br><b>Usos Específicos</b><br><b>[Hackear]:</b> Você invade, contorna ou manipula sistemas digitais, como redes, câmeras, fechaduras eletrônicas e bancos de dados.",
        "Vontade": "<i>Você possui força mental, disciplina e controle emocional, sendo capaz de resistir a medo, dor psicológica e influências externas sobre sua mente.</i>",

    function aplicarModificador(tipo) {
        const inputMod = document.getElementById(`calc-${tipo}`);
        const valorMod = parseInt(inputMod.value);
        if (isNaN(valorMod)) return;

        let curr = parseInt(document.getElementById(`curr-${tipo}`).value) || 0;
        let max = parseInt(document.getElementById(`max-${tipo}`).value) || 1;

        if (valorMod < 0) {
            let danoPuro = Math.abs(valorMod);
            if (tipo === 'pv') {
                let mitigacao = 0;
                if (document.getElementById('chk-bloqueio').checked) {
                    mitigacao += parseInt(document.getElementById('val-bloqueio').value) || 0;
                }
                sheet.rds.forEach((rd, idx) => {
                    const chk = document.getElementById(`chk-rd-${idx}`);
                    if (chk && chk.checked) mitigacao += rd.valor;
                });
                danoPuro = Math.max(danoPuro - mitigacao, 0);
            }

            if (tipo === 'pv' && sheet.recursosFinos.pv_temp > 0) {
                if (sheet.recursosFinos.pv_temp >= danoPuro) {
                    sheet.recursosFinos.pv_temp -= danoPuro; danoPuro = 0;
                } else {
                    danoPuro -= sheet.recursosFinos.pv_temp; sheet.recursosFinos.pv_temp = 0;
                }
            } else if (tipo === 'ps' && sheet.recursosFinos.ps_temp > 0) {
                if (sheet.recursosFinos.ps_temp >= danoPuro) {
                    sheet.recursosFinos.ps_temp -= danoPuro; danoPuro = 0;
                } else {
                    danoPuro -= sheet.recursosFinos.ps_temp; sheet.recursosFinos.ps_temp = 0;
                }
            }
            curr -= danoPuro;
        } else {
            if (curr + valorMod > max) {
                let excesso = (curr + valorMod) - max;
                curr = max;
                if (tipo === 'pv') sheet.recursosFinos.pv_temp += excesso;
                if (tipo === 'ps') sheet.recursosFinos.ps_temp += excesso;
            } else { curr += valorMod; }
        }

        document.getElementById(`curr-${tipo}`).value = curr;
        inputMod.value = ""; 
        updateBar(tipo);
    }

    function updateBar(id) {
        const current = parseInt(document.getElementById(`curr-${id}`).value) || 0;
        const max = parseInt(document.getElementById(`max-${id}`).value) || 1;
        
        let percentage = Math.min(Math.max((current / max) * 100, 0), 100);
        const bar = document.getElementById(`bar-${id}`);
        const badge = document.getElementById(`badge-${id}`);

        if (id === 'pv') {
            badge.className = "condition-badge";
            if (sheet.recursosFinos.pv_temp > 0) {
                bar.className = "status-fill bg-pink"; badge.innerText = `+${sheet.recursosFinos.pv_temp} TEMP`; badge.classList.add("cond-temp"); percentage = 100;
            } else if (current <= 0) {
                bar.className = "status-fill"; bar.style.backgroundColor = "#000"; badge.innerText = "💀 MORRENDO"; badge.classList.add("cond-morrendo");
            } else if (current <= max / 2) {
                bar.className = "status-fill bg-red"; badge.innerText = "🩸 MACHUCADO"; badge.classList.add("cond-machucado");
            } else { bar.className = "status-fill bg-red"; badge.innerText = ""; }
        }

        if (id === 'ps') {
            badge.className = "condition-badge";
            if (sheet.recursosFinos.ps_temp > 0) {
                bar.className = "status-fill bg-blue"; badge.innerText = `+${sheet.recursosFinos.ps_temp} TEMP`; badge.classList.add("cond-temp"); percentage = 100;
            } else if (current <= 0) {
                bar.className = "status-fill"; bar.style.backgroundColor = "#fff"; badge.innerText = "🌀 ENLOUQUECENDO"; badge.classList.add("cond-enlouquecendo");
            } else if (current <= max / 2) {
                bar.className = "status-fill bg-cyan"; badge.innerText = "🧠 PERTURBADO"; badge.classList.add("cond-perturbado");
            } else { bar.className = "status-fill bg-cyan"; badge.innerText = ""; }
        }
        bar.style.width = percentage + "%";
    }

    function calcularVelocidade() {

        let vel = agi >= 1 ? 6 + ((agi - 1) * 2) : 6 + (agi - 1);
        let display = document.getElementById('display-velocidade');
        if (display) display.innerText = vel + "q";
        let inputDesloc = document.getElementById('val-desloc');
        if (inputDesloc) inputDesloc.value = vel;
    }

    function rolarDados(formula) {
        try {
            const clean = formula.toLowerCase().replace(/\s/g, '');
            const parts = clean.split(/([+-])/);
            let total = 0;
            parts.forEach((p, i) => {
                if (p === '+' || p === '-') return;
                let val = 0;
                if (p.includes('d')) {
                    const [qtdStr, facesStr] = p.split('d');
                    let qtd = parseInt(qtdStr) || 1;
                    let faces = parseInt(facesStr);
                    for(let j=0; j<qtd; j++) val += Math.floor(Math.random()*faces)+1;
                } else { val = parseInt(p) || 0; }
                const op = parts[i-1] === '-' ? -1 : 1;
                total += (val * op);
            });
            return total;
        } catch(e) { return 0; }
    }

                        <option value="4" ${p.t==4?'selected':''}>+4</option>
                    </select>
                    <input type="number" value="${p.m}" onchange="atualizarPericia('${p.n}', 'm', this.value)" style="width:35px; background:#000; color:var(--text-gold); border:1px solid #444; text-align:center; font-family:'Cinzel';">
                </div>
            </div>`).join('');
            
        renderAbilities();
        renderRDs();
        atualizarPainelInventario();
        calcularVelocidade(); 
    }

    function exportarFicha() {
        const comp = [
            document.getElementById('user-nickname').value || "",
            sheet.atributos, sheet.pericias, sheet.habilidades, sheet.itens, sheet.rds, sheet.recursosFinos,
            [ document.getElementById('curr-pv').value, document.getElementById('max-pv').value,
              document.getElementById('curr-pa').value, document.getElementById('max-pa').value,
              document.getElementById('curr-ps').value, document.getElementById('max-ps').value ],
            sheet.dificuldade, sheet.limiteCarga,
            document.getElementById('val-defesa').value,
            document.getElementById('val-bloqueio').value,
            document.getElementById('user-sub').value || "",
            document.getElementById('val-nivel').value || 0
        ];
        const codigo = btoa(unescape(encodeURIComponent(JSON.stringify(comp))));
        document.getElementById('codigo-export').value = codigo;
        document.getElementById('codigo-export').select();
        document.execCommand('copy');
        spawnPopup('EXPORTAÇÃO', 'Ficha criptografada copiada!', 'SUCESSO', 'var(--text-gold)', 'PRONTO');
    }

    function importarFicha() {
        try {
            const codigo = document.getElementById('codigo-export').value.trim();
            const dados = JSON.parse(decodeURIComponent(escape(atob(codigo))));
            
            document.getElementById('user-nickname').value = dados[0] || "";
            sheet.atributos = dados[1] || sheet.atributos; sheet.pericias = dados[2] || sheet.pericias;
            sheet.habilidades = dados[3] || []; sheet.itens = dados[4] || [];
            sheet.rds = dados[5] || []; sheet.recursosFinos = dados[6] || { pv_temp: 0, ps_temp: 0 };
            
            if(dados[7]) {
                document.getElementById('curr-pv').value = dados[7][0]; document.getElementById('max-pv').value = dados[7][1];
                document.getElementById('curr-pa').value = dados[7][2]; document.getElementById('max-pa').value = dados[7][3];
                document.getElementById('curr-ps').value = dados[7][4]; document.getElementById('max-ps').value = dados[7][5];
            }
            sheet.dificuldade = dados[8] || 'normal';
            sheet.limiteCarga = dados[9] || 20; document.getElementById('peso-max-input').value = sheet.limiteCarga;
            if(dados[10]) document.getElementById('val-defesa').value = dados[10];
            if(dados[11]) document.getElementById('val-bloqueio').value = dados[11];
            if(dados[12]) document.getElementById('user-sub').value = dados[12];
            if(dados[13]) document.getElementById('val-nivel').value = dados[13];

            render(); setDif(sheet.dificuldade); ['pv', 'pa', 'ps'].forEach(updateBar);
            spawnPopup('IMPORTAÇÃO', 'Registros sincronizados', 'SUCESSO', 'var(--light-purple)', 'CARREGADO');
        } catch(e) { alert("Erro crítico na leitura do código digital."); }
    }

    function salvarNoNavegador() {
        const slot = document.getElementById('save-slot').value;
        const dados = {
            nickname: document.getElementById('user-nickname').value,
            sub: document.getElementById('user-sub').value,
            atributos: sheet.atributos, pericias: sheet.pericias, habilidades: sheet.habilidades,
            itens: sheet.itens, rds: sheet.rds, recursosFinos: sheet.recursosFinos,
            dificuldade: sheet.dificuldade, limiteCarga: sheet.limiteCarga,
            defesa: document.getElementById('val-defesa').value, bloqueio: document.getElementById('val-bloqueio').value,
            nivel: document.getElementById('val-nivel').value,
            recValues: {
                pv_c: document.getElementById('curr-pv').value, pv_m: document.getElementById('max-pv').value,
                pa_c: document.getElementById('curr-pa').value, pa_m: document.getElementById('max-pa').value,
                ps_c: document.getElementById('curr-ps').value, ps_m: document.getElementById('max-ps').value
            }
        };
        localStorage.setItem('ficha_abyss_v2_slot_' + slot, JSON.stringify(dados));
        alert(`Sincronizado no Slot ${slot} do Navegador!`);
    }

    function carregarDoNavegador() {
        const slot = document.getElementById('save-slot').value;
        const salvo = localStorage.getItem('ficha_abyss_v2_slot_' + slot) || localStorage.getItem('ficha_abyss_v2');
        if (salvo) {
            const d = JSON.parse(salvo);
            document.getElementById('user-nickname').value = d.nickname || "";
            document.getElementById('user-sub').value = d.sub || "";
            sheet.atributos = d.atributos || sheet.atributos;
            sheet.pericias = d.pericias || []; sheet.habilidades = d.habilidades || [];
            sheet.itens = d.itens || []; sheet.rds = d.rds || [];
            sheet.recursosFinos = d.recursosFinos || { pv_temp:0, ps_temp:0 };
            sheet.dificuldade = d.dificuldade || 'normal';
            sheet.limiteCarga = d.limiteCarga || 20;
            document.getElementById('peso-max-input').value = sheet.limiteCarga;
            
            if(d.defesa) document.getElementById('val-defesa').value = d.defesa;
            if(d.bloqueio) document.getElementById('val-bloqueio').value = d.bloqueio;
            if(d.nivel) document.getElementById('val-nivel').value = d.nivel;

            if(d.recValues) {
                document.getElementById('curr-pv').value = d.recValues.pv_c; document.getElementById('max-pv').value = d.recValues.pv_m;
                document.getElementById('curr-pa').value = d.recValues.pa_c; document.getElementById('max-pa').value = d.recValues.pa_m;
                document.getElementById('curr-ps').value = d.recValues.ps_c; document.getElementById('max-ps').value = d.recValues.ps_m;
            }
            render(); setDif(sheet.dificuldade); ['pv', 'pa', 'ps'].forEach(updateBar);
        } else {
            sheet.pericias = periciasDados.map(p => ({ ...p, t: 0, m: 0 }));
            render();
        }
    }

    window.onload = () => { carregarDoNavegador(); };
</script>
</body>
</html>
